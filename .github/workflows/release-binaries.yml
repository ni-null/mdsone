name: Build and Release Bun Binaries

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      tag_name:
        description: "Release tag (example: v0.2.8)"
        required: false
        type: string
  # Enable this block when you are ready for automatic tag releases.
  # push:
  #   tags:
  #     - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build Bun binaries
        run: npm run bun:build:exe

      - name: Generate checksums
        shell: bash
        run: |
          cd Bun/dist
          sha256sum \
            mdsone-win-x64.exe \
            mdsone-linux-x64 \
            mdsone-macos-x64 \
            mdsone-macos-arm64 > SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bun-binaries
          path: |
            Bun/dist/mdsone-win-x64.exe
            Bun/dist/mdsone-linux-x64
            Bun/dist/mdsone-macos-x64
            Bun/dist/mdsone-macos-arm64
            Bun/dist/SHA256SUMS.txt

  release:
    needs: build
    if: ${{ github.event.inputs.publish_release == 'true' && github.event.inputs.tag_name != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bun-binaries
          path: Bun/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(github.event.inputs.tag_name, '-') }}
          files: |
            Bun/dist/mdsone-win-x64.exe
            Bun/dist/mdsone-linux-x64
            Bun/dist/mdsone-macos-x64
            Bun/dist/mdsone-macos-arm64
            Bun/dist/SHA256SUMS.txt
