<!doctype html>
<html lang="{LANG}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{TITLE}</title>
    {LIB_CSS}
    {EXTRA_CSS}
  </head>
  <body>
    {SVG_SPRITE}
    <div class="container">
      <div class="mobile-topbar" id="mobile-topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
          <span class="icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <use href="#icon-menu" xlink:href="#icon-menu"></use>
            </svg>
          </span>
        </button>
        <span class="mobile-topbar-title">{TITLE}</span>
      </div>

      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <div class="logo-text"><span>{TITLE}</span></div>
          </div>
        </div>

        <div class="sidebar-controls">
          <button class="menu-btn" id="menu-btn" title="" aria-label="Toggle menu">
            <span class="icon-svg" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <use href="#icon-menu" xlink:href="#icon-menu"></use>
              </svg>
            </span>
          </button>
          <div class="lang-switcher" id="lang-switcher"></div>
          <button class="font-size-toggle" id="font-size-toggle" title="">
            <span class="font-size-label" id="font-size-label"></span>
          </button>
          <button class="theme-toggle" id="theme-toggle" title="">
            <span class="theme-icon" id="theme-icon"></span>
          </button>
        </div>

        <div class="tab-list" id="tab-list"></div>
        <div class="sidebar-footer" id="sidebar-footer"></div>
      </aside>

      <div class="main-content">
        <div class="content-area" id="content-area"></div>
      </div>
    </div>

    {MDSONE_DATA_SCRIPT}
    {LIB_JS}
    {EXTRA_JS}
  </body>
</html>
